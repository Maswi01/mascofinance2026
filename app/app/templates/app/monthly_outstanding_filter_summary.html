{% extends 'app/base.html' %}
{% load static %}
{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; }

    .page-wrapper {
        padding: 50px 40px;
        margin-top: 70px;
        font-family: 'Poppins', sans-serif;
        background: #f0f2f5;
        min-height: calc(100vh - 70px);
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    .filter-card {
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        padding: 36px 40px 40px;
        width: 100%;
        max-width: 860px;
    }

    .form-title {
        font-size: 18px;
        font-weight: 700;
        color: #1a2a4a;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding-bottom: 14px;
        border-bottom: 2px solid #e0e0e0;
        margin-bottom: 32px;
    }

    .month-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 32px;
    }

    .month-row label {
        font-size: 14px;
        color: #444;
        font-weight: 400;
        white-space: nowrap;
    }

    .month-input {
        padding: 10px 14px;
        border: 1px solid #cdd4da;
        border-radius: 4px;
        font-size: 13.5px;
        font-family: 'Poppins', sans-serif;
        color: #333;
        background: #fff;
        outline: none;
        width: 280px;
        transition: border-color 0.2s;
    }

    .month-input:focus {
        border-color: #7c4dff;
        box-shadow: 0 0 0 3px rgba(124,77,255,0.1);
    }

    .form-divider {
        border: none;
        border-top: 1px solid #e0e0e0;
        margin: 0 0 28px;
    }

    .submit-row { display: flex; justify-content: center; }

    /* Purple CONTINUE button */
    .btn-continue {
        background: #7c4dff;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 10px 28px;
        font-size: 13.5px;
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.5px;
        transition: background 0.2s, transform 0.15s;
        box-shadow: 0 2px 8px rgba(124,77,255,0.3);
    }

    .btn-continue:hover { background: #651fff; transform: translateY(-1px); }

    .alert {
        padding: 11px 16px;
        border-radius: 5px;
        font-size: 13px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .alert-error { background: #fce4e4; color: #c62828; border: 1px solid #ffcdd2; }

    @media (max-width: 768px) {
        .page-wrapper { padding: 20px 16px; margin-top: 60px; }
        .filter-card { padding: 24px 16px; }
        .month-row { flex-direction: column; align-items: flex-start; }
        .month-input { width: 100%; }
    }
</style>

<div class="page-wrapper">
    <div class="filter-card">
        <div class="form-title">Repayment Schedules</div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                <i class="fas fa-exclamation-circle"></i> {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="get" action="{% url 'monthly_outstanding_result_summary' %}">
            <div class="month-row">
                <label for="month">Month</label>
                <input
                    type="date"
                    id="month"
                    name="month"
                    class="month-input"
                    value="{{ selected_month|default:'' }}"
                    required
                >
            </div>

            <hr class="form-divider">

            <div class="submit-row">
                <button type="submit" class="btn-continue">
                    <i class="fas fa-check-square"></i> CONTINUE &gt;&gt;
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
