{% extends 'app/base.html' %}
{% load static %}
{% load humanize %}
{% block content %}

<style>
    body {
        background: #f0f0f0;
    }

    .lier-wrapper {
        max-width: 1100px;
        margin: 30px auto 60px;
        padding: 0 24px;
        font-family: Arial, sans-serif;
    }

    .lier-card {
        background: #fff;
        padding: 32px 48px 40px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    }

    /* ── Title ── */
    .lier-title {
        font-size: 17px;
        font-weight: 700;
        color: #1a1a1a;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding-bottom: 12px;
        border-bottom: 1.5px solid #ccc;
        margin-bottom: 32px;
    }

    /* ── Messages ── */
    .alert-success {
        background: #d4edda; border: 1px solid #c3e6cb; color: #155724;
        padding: 10px 16px; border-radius: 3px; font-size: 13px;
        margin-bottom: 20px;
    }
    .alert-error {
        background: #fde8e8; border: 1px solid #f5c6c6; color: #b00;
        padding: 10px 16px; border-radius: 3px; font-size: 13px;
        margin-bottom: 20px;
    }

    /* ── Form rows ── */
    .lier-row {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    .lier-row label {
        width: 120px;
        flex-shrink: 0;
        font-size: 14px;
        color: #444;
        text-align: right;
        padding-right: 20px;
        font-family: Arial, sans-serif;
    }

    .lier-row .fw {
        flex: 1;
        max-width: 520px;
    }

    /* Readonly inputs — grey bg matching image */
    .lier-row input[type="text"][readonly],
    .lier-input-readonly {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #d0d0d0;
        border-radius: 3px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        color: #444;
        background: #e9ecef;
        cursor: not-allowed;
        box-sizing: border-box;
        outline: none;
    }

    /* Editable inputs — white bg */
    .lier-row input[type="text"].editable,
    .lier-row input[type="date"] {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #d0d0d0;
        border-radius: 3px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        color: #333;
        background: #e9ecef;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
        max-width: 240px;
    }

    .lier-row input[type="text"].editable:focus,
    .lier-row input[type="date"]:focus {
        border-color: #1abc9c;
        background: #fff;
        box-shadow: 0 0 0 2px rgba(26,188,156,0.12);
    }

    /* ── Divider ── */
    .lier-divider {
        border: none;
        border-top: 1px solid #ddd;
        margin: 10px 0 28px;
    }

    /* ── Submit button — teal, centred, matching image ── */
    .lier-actions {
        text-align: center;
    }

    .continue-btn {
        display: inline-block;
        padding: 11px 36px;
        background: #1abc9c;
        color: #fff;
        border: none;
        border-radius: 3px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 0.8px;
        cursor: pointer;
        text-transform: uppercase;
        transition: background 0.15s;
    }

    .continue-btn:hover { background: #16a085; }

    @media (max-width: 600px) {
        .lier-row { flex-direction: column; align-items: flex-start; }
        .lier-row label { width: 100%; text-align: left; padding-right: 0; margin-bottom: 5px; }
        .lier-row .fw { max-width: 100%; width: 100%; }
        .lier-card { padding: 20px; }
        .lier-row input[type="text"].editable,
        .lier-row input[type="date"] { max-width: 100%; }
    }
</style>

<div class="lier-wrapper">
    <div class="lier-card">

        <div class="lier-title">Loan Issued Editing Report</div>

        {% if messages %}
            {% for msg in messages %}
            <div class="alert-{% if 'success' in msg.tags %}success{% else %}error{% endif %}">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'loan_issued_report_edit' loan.id %}">
            {% csrf_token %}

            <!-- Name — readonly -->
            <div class="lier-row">
                <label>Name</label>
                <div class="fw">
                    <input type="text" value="{{ name }}" readonly>
                </div>
            </div>

            <!-- Loan ID — readonly -->
            <div class="lier-row">
                <label>Loan ID</label>
                <div class="fw">
                    <input type="text" value="{{ loan_id_label }}" readonly>
                </div>
            </div>

            <!-- Amount — editable, comma-formatted -->
            <div class="lier-row">
                <label>Amount</label>
                <div class="fw">
                    <input type="text" id="amountDisplay" class="editable"
                           value="{{ loan.loan_amount|floatformat:0|intcomma }}"
                           inputmode="numeric" autocomplete="off">
                    <input type="hidden" name="loan_amount" id="amountHidden"
                           value="{{ loan.loan_amount|floatformat:0 }}">
                </div>
            </div>

            <!-- Application Date — editable -->
            <div class="lier-row">
                <label>Date</label>
                <div class="fw">
                    <input type="date" name="application_date"
                           value="{{ loan.application_date|date:'Y-m-d' }}">
                </div>
            </div>

            <hr class="lier-divider">

            <div class="lier-actions">
                <button type="submit" class="continue-btn">CONTINUE &gt;&gt;</button>
            </div>
        </form>

    </div>
</div>

<script>
/* ── Comma formatting for Amount field ── */
const display = document.getElementById('amountDisplay');
const hidden  = document.getElementById('amountHidden');

display.addEventListener('input', function () {
    const raw = this.value.replace(/[^0-9]/g, '');
    this.value  = raw ? Number(raw).toLocaleString('en-US') : '';
    hidden.value = raw;
});
</script>

{% endblock %}
