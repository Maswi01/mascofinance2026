{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<style>
    .lp-wrapper {
        max-width: 900px;
        margin: 30px auto 60px;
        padding: 0 20px;
        font-family: Arial, sans-serif;
    }
    .lp-card {
        background: #fff;
        border: 1px solid #ddd;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        padding: 28px 50px 40px;
    }
    .part-title {
        font-size: 16px; font-weight: 700; color: #1a1a1a;
        letter-spacing: 0.5px; padding-bottom: 10px;
        border-bottom: 1.5px solid #999; margin-bottom: 32px;
        font-family: Arial, sans-serif; text-transform: uppercase;
    }
    .filter-row {
        display: flex; align-items: center; gap: 24px;
        flex-wrap: wrap; margin-bottom: 24px;
    }
    .filter-field { display: flex; align-items: center; gap: 14px; }
    .filter-field label {
        font-size: 14px; color: #333;
        font-family: Arial, sans-serif; white-space: nowrap;
    }
    .filter-field input[type="date"] {
        padding: 9px 12px; border: 1px solid #ccc; border-radius: 2px;
        font-size: 13.5px; font-family: Arial, sans-serif;
        color: #333; outline: none; min-width: 200px;
        transition: border-color 0.15s;
    }
    .filter-field input[type="date"]:focus {
        border-color: #9b59b6;
        box-shadow: 0 0 0 2px rgba(155,89,182,0.12);
    }
    .filter-divider { border: none; border-top: 1px solid #e0e0e0; margin: 4px 0 24px; }
    .filter-actions { text-align: center; }
    .continue-btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 28px;
        background: #9b59b6; color: #fff; border: none;
        border-radius: 3px; font-size: 14px; font-family: Arial, sans-serif;
        font-weight: 700; cursor: pointer; letter-spacing: 0.3px;
        transition: background 0.15s;
    }
    .continue-btn:hover { background: #7d3c98; }
    .continue-btn .icon { font-size: 13px; }

    @media (max-width: 650px) {
        .filter-row { flex-direction: column; gap: 16px; }
        .lp-card { padding: 20px; }
    }
</style>

<div class="lp-wrapper">
    <div class="lp-card">
        <div class="part-title">Repayment Schedules</div>

        <form method="POST" action="{% url 'monthly_outstanding_report' %}">
            {% csrf_token %}
            <div class="filter-row">
                <div class="filter-field">
                    <label>Month</label>
                    <input type="date" name="selected_month" id="selectedMonth" required>
                </div>
            </div>
            <hr class="filter-divider">
            <div class="filter-actions">
                <button type="submit" class="continue-btn">
                    <span class="icon">✔</span> CONTINUE&gt;&gt;
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    /* Default to first day of current month */
    const now   = new Date();
    const year  = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    document.getElementById('selectedMonth').value = `${year}-${month}-01`;
})();
</script>
{% endblock %}
