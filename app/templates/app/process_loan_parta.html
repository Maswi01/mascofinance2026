{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<style>
    .pl-wrapper {
        max-width: 860px;
        margin: 30px auto 60px;
        padding: 0 20px;
        font-family: Georgia, 'Times New Roman', serif;
        margin-top: 70px;
    }

    .pl-card {
        background: #fff;
        border: 1px solid #ddd;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        padding: 32px 40px 36px;
    }

    /* ── Part title ── */
    .part-title {
        font-size: 16px;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: 0.4px;
        padding-bottom: 10px;
        border-bottom: 1.5px solid #999;
        margin-bottom: 28px;
        font-family: Arial, sans-serif;
    }

    /* ── Form grid ── */
    .form-grid-4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0 18px;
        margin-bottom: 20px;
    }

    .form-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0 18px;
        margin-bottom: 20px;
    }

    .form-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 18px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 18px;
    }

    .form-group label {
        font-size: 13px;
        color: #444;
        font-family: Arial, sans-serif;
        font-weight: 400;
    }

    .form-group input,
    .form-group select {
        padding: 9px 12px;
        border: 1px solid #ccc;
        border-radius: 2px;
        font-size: 13.5px;
        font-family: Arial, sans-serif;
        color: #1a1a1a;
        background: #fff;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
        box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group select:focus {
        border-color: #5bc0de;
        box-shadow: 0 0 0 2px rgba(91,192,222,0.15);
    }

    .form-group input[readonly] {
        background: #f5f5f5;
        color: #666;
        cursor: not-allowed;
    }

    /* ── Bottom bar ── */
    .form-bottom {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
        padding-top: 18px;
        border-top: 1px solid #e8e8e8;
    }

    .next-btn {
        padding: 9px 28px;
        background: #5bc0de;
        color: #fff;
        border: none;
        border-radius: 3px;
        font-size: 14px;
        font-family: Arial, sans-serif;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: background 0.15s;
    }

    .next-btn:hover { background: #31aeca; }

    /* ── Messages ── */
    .alert-error {
        background: #fde8e8;
        border: 1px solid #f5c6c6;
        color: #b00;
        padding: 10px 16px;
        border-radius: 3px;
        font-size: 13px;
        font-family: Arial, sans-serif;
        margin-bottom: 18px;
    }

    @media (max-width: 800px) {
        .form-grid-4 { grid-template-columns: repeat(2, 1fr); }
        .form-grid-3 { grid-template-columns: repeat(2, 1fr); }
        .pl-card { padding: 20px; }
    }

    @media (max-width: 500px) {
        .form-grid-4, .form-grid-3, .form-grid-2 { grid-template-columns: 1fr; }
    }
</style>

<div class="pl-wrapper">
    <div class="pl-card">

        <div class="part-title">PART A: PERSON INFORMATION</div>

        {% if messages %}
            {% for msg in messages %}
            <div class="alert-error">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'process_loan_partb' client.id %}">
            {% csrf_token %}
            <!-- Pass client id through -->
            <input type="hidden" name="client_id" value="{{ client.id }}">

            <!-- Row 1: Name + Gender -->
            <div class="form-grid-4">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="firstname" value="{{ client.firstname }}" required>
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" name="middlename" value="{{ client.middlename|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="lastname" value="{{ client.lastname }}" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="">—</option>
                        <option value="M" {% if client.gender == 'M' %}selected{% endif %}>M</option>
                        <option value="F" {% if client.gender == 'F' %}selected{% endif %}>F</option>
                    </select>
                </div>
            </div>

            <!-- Row 2: Work Station, Home Address, Ward, District -->
            <div class="form-grid-4">
                <div class="form-group">
                    <label>Work Station</label>
                    <input type="text" name="employername" value="{{ client.employername|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Home Address</label>
                    <input type="text" name="mtaa" value="{{ client.mtaa|default:client.street|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Ward</label>
                    <input type="text" name="kata" value="{{ client.kata|default:'' }}">
                </div>
                <div class="form-group">
                    <label>District</label>
                    <input type="text" name="wilaya" value="{{ client.wilaya|default:client.district|default:'' }}">
                </div>
            </div>

            <!-- Row 3: Age, Purpose, Department -->
            <div class="form-grid-3">
                <div class="form-group">
                    <label>Age</label>
                    <select name="age">
                        {% for age in age_choices %}
                        <option value="{{ age }}" {% if client_age == age %}selected{% endif %}>{{ age }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Purpose</label>
                    <select name="purpose">
                        <option value="">— Select —</option>
                        <option value="Education" {% if client.purpose == 'Education' %}selected{% endif %}>Education</option>
                        <option value="Business" {% if client.purpose == 'Business' %}selected{% endif %}>Business</option>
                        <option value="Medical" {% if client.purpose == 'Medical' %}selected{% endif %}>Medical</option>
                        <option value="Agriculture" {% if client.purpose == 'Agriculture' %}selected{% endif %}>Agriculture</option>
                        <option value="Construction" {% if client.purpose == 'Construction' %}selected{% endif %}>Construction</option>
                        <option value="Emergency" {% if client.purpose == 'Emergency' %}selected{% endif %}>Emergency</option>
                        <option value="Other" {% if client.purpose == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="idara" value="{{ client.idara|default:'' }}">
                </div>
            </div>

            <!-- Row 4: Check No, Mobile No, Account No, Bank Name -->
            <div class="form-grid-4">
                <div class="form-group">
                    <label>Check No</label>
                    <input type="text" name="checkno" value="{{ client.checkno|default:client.employmentcardno|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Mobile No</label>
                    <input type="text" name="phonenumber" value="{{ client.phonenumber|default:'' }}">
                </div>
                <div class="form-group">
                    <label>Account No</label>
                    <input type="text" name="bank_account_number" value="{{ client.bank_account_number|default:'' }}" placeholder="Bank Account number">
                </div>
                <div class="form-group">
                    <label>Bank Name</label>
                    <select name="bank_name">
                        <option value="">Select bank name</option>
                        <option value="CRDB"     {% if client.bank_name == 'CRDB' %}selected{% endif %}>CRDB</option>
                        <option value="NMB"      {% if client.bank_name == 'NMB' %}selected{% endif %}>NMB</option>
                        <option value="NBC"      {% if client.bank_name == 'NBC' %}selected{% endif %}>NBC</option>
                        <option value="Standard Chartered" {% if client.bank_name == 'Standard Chartered' %}selected{% endif %}>Standard Chartered</option>
                        <option value="Exim Bank" {% if client.bank_name == 'Exim Bank' %}selected{% endif %}>Exim Bank</option>
                        <option value="DCB"      {% if client.bank_name == 'DCB' %}selected{% endif %}>DCB</option>
                        <option value="Amana Bank" {% if client.bank_name == 'Amana Bank' %}selected{% endif %}>Amana Bank</option>
                        <option value="Other"    {% if client.bank_name == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
            </div>

            <div class="form-bottom">
                <button type="submit" class="next-btn">NEXT&gt;&gt;&gt;</button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
