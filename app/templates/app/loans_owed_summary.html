{% extends 'app/base.html' %}
{% load static %}
{% block content %}

<style>
    .lo-wrapper {
        max-width: 1100px;
        margin: 30px auto 60px;
        padding: 0 20px;
        font-family: Arial, sans-serif;
    }

    /* Light-blue top bar */
    .lo-topbar {
        background: #7fc8d9;
        color: #fff; font-size: 14px; font-weight: 700;
        padding: 10px 20px; letter-spacing: 0.5px; text-transform: uppercase;
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 0;
    }
    .lo-topbar-sq { width: 36px; height: 24px; background: #4aa8be; border-radius: 2px; }

    /* Summary card */
    .lo-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        display: flex;
        min-height: 200px;
    }

    /* Left grey sidebar */
    .lo-sidebar {
        width: 220px;
        min-width: 220px;
        border-right: 1px solid #e8e8e8;
        background: #f7f7f7;
    }

    /* Main summary area */
    .lo-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        gap: 10px;
    }

    .lo-big-number {
        font-size: 48px; font-weight: 300; color: #888;
        line-height: 1; font-family: Arial, sans-serif;
    }
    .lo-big-label {
        font-size: 13px; font-weight: 400; color: #aaa;
        text-transform: uppercase; letter-spacing: 1px;
        font-family: Arial, sans-serif;
    }

    /* Sub-stats row */
    .lo-substats {
        display: flex;
        margin-top: 16px;
        border-top: 1px solid #f0f0f0;
        width: 100%;
        justify-content: center;
        gap: 0;
    }
    .lo-stat-item {
        padding: 16px 28px;
        border-right: 1px solid #e8e8e8;
        text-align: center;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        color: inherit;
        display: block;
    }
    .lo-stat-item:last-child { border-right: none; }
    .lo-stat-item:hover { background: #f5f5f5; }

    .lo-stat-label {
        font-size: 13.5px; font-weight: 400; color: #555;
        font-family: Arial, sans-serif;
        white-space: nowrap;
    }

    @media (max-width: 700px) {
        .lo-sidebar { display: none; }
        .lo-substats { flex-direction: column; }
        .lo-stat-item { border-right: none; border-bottom: 1px solid #f0f0f0; }
    }
</style>

<div class="lo-wrapper">
    <div class="lo-topbar">
        <span>Loans Owed</span>
        <div class="lo-topbar-sq"></div>
    </div>

    <div class="lo-card">
        <div class="lo-sidebar"></div>

        <div class="lo-main">
            <div class="lo-big-number">{{ total_loans_owed }}</div>
            <div class="lo-big-label">Total Loans Owed</div>

            <div class="lo-substats">
                <!-- CASH — click to go to the report -->
                <a class="lo-stat-item"
                   href="{% url 'loans_owed_report' %}?type=cash">
                    <span class="lo-stat-label">
                        CASH ({{ cash_loans_count }})
                    </span>
                </a>

                <!-- HAZINA — zero as requested -->
                <div class="lo-stat-item" style="cursor:default;">
                    <span class="lo-stat-label">
                        HAZINA (0)
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
