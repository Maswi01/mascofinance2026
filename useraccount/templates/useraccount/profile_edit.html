{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0 rounded-4 p-4">
        <h4 class="card-title mb-4 text-center">Edit Profile</h4>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <h6>User Info</h6>
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" name="first_name" 
                    value="{{ user_form.instance.first_name }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" name="last_name" 
                    value="{{ user_form.instance.last_name }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" 
                    value="{{ user_form.instance.email }}">
            </div>

            <h6 class="mt-4">Profile Info</h6>
            <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea class="form-control" name="bio" rows="3">{{ profile_form.instance.bio }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" name="location" 
                    value="{{ profile_form.instance.location }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Profile Image</label>
                <input type="file" class="form-control" name="image">
                {% if user_form.instance.image %}
                <img src="{{ user_form.instance.image.url }}" alt="Profile Image" 
                    class="img-thumbnail mt-2" width="120">
                {% endif %}
            </div>

            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary">Update Profile</button>
            </div>
            </form>


      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
