{% extends 'app/base.html' %}
{% block content %}

<style>
    .success-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 200px);
        padding: 2rem 1rem;
    }

    .success-card {
        width: 100%;
        max-width: 460px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 10px 32px rgba(0,0,0,0.16);
        overflow: hidden;
    }

    .success-header {
        background: linear-gradient(135deg, #0fc0c0, #2dd4d4);
        padding: 1.5rem 1.75rem;
        position: relative;
        overflow: hidden;
    }

    .success-header::after {
        content: '';
        position: absolute;
        top: -20px; right: -20px;
        width: 100px; height: 100px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        pointer-events: none;
    }

    .success-header-inner {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        position: relative;
        z-index: 1;
    }

    .success-header-icon {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.3rem; color: #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        flex-shrink: 0;
    }

    .success-header h4 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
    }

    .success-header p {
        margin: 0.2rem 0 0;
        font-size: 0.82rem;
        color: rgba(255,255,255,0.85);
    }

    .success-body {
        padding: 2.5rem 1.75rem;
        text-align: center;
    }

    .success-icon-wrap {
        width: 80px; height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #d0fdf4, #e0fbf8);
        border: 3px solid #0fc0c0;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.25rem;
        animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .success-icon-wrap i {
        font-size: 2.2rem;
        color: #0aadad;
    }

    @keyframes pop-in {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
    }

    .success-body h5 {
        font-size: 1.1rem;
        font-weight: 700;
        color: #0d4a7a;
        margin-bottom: 0.5rem;
    }

    .success-body p {
        font-size: 0.9rem;
        color: #475569;
        margin-bottom: 1.75rem;
        line-height: 1.6;
    }

    .divider {
        height: 1px;
        background: #e8f0f8;
        margin: 0 0 1.5rem;
    }

    .btn-cp {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.65rem 2rem;
        border-radius: 7px;
        font-family: 'Source Sans 3', sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all 0.22s ease;
        background: linear-gradient(135deg, #0fc0c0, #2dd4d4);
        color: #fff;
        box-shadow: 0 4px 14px rgba(15,192,192,0.35);
    }

    .btn-cp:hover {
        box-shadow: 0 6px 20px rgba(15,192,192,0.5);
        transform: translateY(-1px);
        color: #fff;
    }
</style>

<div class="success-wrap">
    <div class="success-card">

        <div class="success-header">
            <div class="success-header-inner">
                <div class="success-header-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div>
                    <h4>Password Changed</h4>
                    <p>Your account security has been updated</p>
                </div>
            </div>
        </div>

        <div class="success-body">
            <div class="success-icon-wrap">
                <i class="fas fa-check"></i>
            </div>
            <h5>Password Updated Successfully!</h5>
            <p>Your password has been changed successfully.<br>You can now use your new password to log in.</p>
            <div class="divider"></div>
            <a href="{% url 'index' %}" class="btn-cp">
                <i class="fas fa-home"></i> Return to Dashboard
            </a>
        </div>

    </div>
</div>

{% endblock %}
