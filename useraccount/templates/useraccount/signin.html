{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" type="x-icon" href="{% static 'useraccount/masco.png' %}" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masco Finance Company Limited</title>
  <!-- SweetAlert2 CDN for popup-->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #3ecfcf;
    }

    /* Top dark blue bar */
    .top-bar {
      background: #1a3a6b;
      height: 48px;
      width: 100%;
    }

    /* Main content area */
    .main {
      flex: 1;
      background: #3ecfcf;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Login card */
    .card {
      background: #f0f0f0;
      border-radius: 8px;
      width: 100%;
      max-width: 420px;
      padding: 40px 40px 50px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo area */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    /* SVG Logo */
    .logo-svg {
      width: 110px;
      height: 110px;
      margin-bottom: 6px;
    }

    .brand-name {
      color: #1a3a6b;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      line-height: 1;
    }

    .brand-sub {
      color: #555;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Divider with text */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 28px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ccc;
    }
    .divider span {
      color: #888;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* Form fields */
    .field {
      margin-bottom: 16px;
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #3ecfcf;
    }

    .field input::placeholder {
      color: #aaa;
    }

    .field .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 1rem;
    }

    .field.has-icon input {
      padding-left: 42px;
    }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: #3aab7b;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover {
      background: #2e9668;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    /* Footer */
    .footer {
      background: #1a3a6b;
      color: #fff;
      font-size: 0.8rem;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer .powered {
      color: #f5a623;
      font-style: italic;
      font-weight: 500;
    }

    .footer .powered span {
      color: #fff;
      font-style: normal;
      font-weight: 400;
    }
  </style>
</head>
<body>

    {% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({
                title: "{% if message.tags == 'error' %}Error!{% else %}Success!{% endif %}",
                text: "{{ message|escapejs }}",
                icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% elif message.tags == 'info' %}info{% else %}success{% endif %}",
                confirmButtonText: "OK"
            });
        {% endfor %}
    </script>
    {% endif %}

  <div class="top-bar"></div>

  <main class="main">
    <div class="card">
      <div class="logo-wrap">
        <!-- Masco Logo SVG -->
        <img src="{% static 'app/masco_logo.png' %}" alt="" height="170px" width="auto">
      </div>

      <div class="divider"><span>Provide your Login Detail</span></div>

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <input type="text" id="username" placeholder="Your Username" autocomplete="username" name="username" required />
        </div>

        <div class="field has-icon">
          <span class="icon">🔑</span>
          <input type="password" id="password" placeholder="Enter Password" autocomplete="current-password" name="password1" required />
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <span>Copyright &copy; 2026 MASCO FINANCE Company Limited , All rights reserved.</span>
    <span class="powered"><span>Powered by </span><em>MASCO Digital Technology</em></span>
  </footer>

</body>
</html>
