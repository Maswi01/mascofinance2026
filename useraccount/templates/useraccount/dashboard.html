<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body text-center p-5">
                <h1 class="fw-bold mb-4 text-primary">WELCOME TO DASHBOARD</h1>
                
                {% if user.is_authenticated %}
                    <p class="lead">Welcome, <span class="fw-bold">{{ user.username }}</span></p>
                    <div class="d-flex justify-content-center gap-3 mt-3">
                        <a href="{% url 'change_password' %}" class="btn btn-outline-warning">Change Password</a>
                        <a href="{% url 'profile' %}" class="btn btn-outline-info">Profile Page</a>
                        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
                    </div>
                {% else %}
                    <p class="lead">You are not logged in.</p>
                    <a href="{% url 'signin' %}" class="btn btn-primary">Login</a>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
